events {}

http {

    upstream route_service {
        server route-service:8000;
    }

    upstream place_service {
        server place-service:8000;
    }

    server {

        listen 80;

        # Маршруты Route Service: /routes/**
        location /routes/ {
            proxy_pass http://route_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Маршруты Place & Budget Service: /places/**
        location /places/ {
            proxy_pass http://place_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check
        location /health {
            return 200 '{"gateway":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
